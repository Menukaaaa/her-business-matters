<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Her Business Matters - Sri Lanka's Finest Female-Led Brands</title>
    <meta name="description"
        content="Explore our curated showcase of Sri Lanka's finest female-led, locally manufactured brands.">
    <!-- Google Fonts: Cinzel (Luxury Serif for Titles) and Inter (Sans-serif) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Background Animation -->
    <div class="bg-animation">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="shape shape-4"></div>
    </div>

    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="#" class="logo-link">
                <img src="header-logo-new3.png" alt="Her Business Matters Logo" class="header-logo-img"
                    style="height: 48px; object-fit: contain;" loading="eager">
            </a>
            <div class="nav-links">
                <a href="#featured">Featured</a>
                <a href="#categories">Discover More</a>
            </div>
        </div>
    </nav>

    <header class="hero" id="hero">
        <div class="hero-content">
            <h1 class="hero-title">Celebrating Her Vision</h1>
            <div class="hero-underline"></div>
            <p class="hero-subtitle">Meet the women shaping the future of local business. Explore our curated showcase
                of Sri Lanka's finest female-led, locally manufactured brands.</p>
        </div>
        <a href="#featured" class="explore-pill">
            Explore <i data-feather="chevron-down"></i>
        </a>
    </header>

    <main>
        <section class="featured-section" id="featured">
            <div class="section-container">
                <h2 class="section-title text-center" style="display: block; text-align: center;">Featured Brands</h2>

                <div class="featured-scroll-container">
                    <div class="featured-grid" id="featured-grid">
                        <!-- Featured cards will be injected here via JS -->
                    </div>
                </div>
            </div>
        </section>

        <section class="categories-section" id="categories">
            <div class="section-container">
                <h2 class="section-title text-center" style="display: block; text-align: center;">Discover More</h2>
                <div class="categories-container" id="categories-container">
                    <!-- Categories will be injected here via JS -->
                </div>

                <div class="categories-container" id="other-category-container">
                    <!-- Other category will be injected here via JS -->
                </div>
            </div>
        </section>
    </main>



    <!-- Feather Icons for UI elements -->
    <!-- Modal Overlay -->
    <div id="business-modal" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="modal-close-btn" onclick="closeModal()"><i data-feather="x"></i></button>
            <div id="modal-body-content">
                <!-- Injected via JS -->
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/feather-icons"></script>
    <script src="script.js"></script>
</body>

</html>
